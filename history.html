<!DOCTYPE html>
<html>

<head>

<title>History</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="sidebar">

<h3>☁ Cloud Monitor</h3>

<a href="/dashboard">Dashboard</a>
<a href="/history">History</a>
<a href="/alerts">Alerts</a>
<a href="/reports">Reports</a>
<a href="/logout">Logout</a>

</div>

<div class="main-content">

<h2>Monitoring History</h2>
<form method="GET" class="mb-3">

<div class="row">

<div class="col-md-4">

<input
type="text"
name="search"
class="form-control"
placeholder="Search by date">

</div>

<div class="col-md-2">

<button class="btn btn-primary">

Search

</button>
<a
href="/export_csv"
class="btn btn-success mb-3">

Export CSV

</a>
</div>

</div>

</form>

<table class="table table-bordered table-striped">

<thead>

<tr>

<th>ID</th>
<th>CPU</th>
<th>Memory</th>
<th>Disk</th>
<th>Network</th>
<th>Timestamp</th>

</tr>

</thead>

<tbody>

{% for row in records %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}%</td>
<td>{{ row[2] }}%</td>
<td>{{ row[3] }}%</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
