<!DOCTYPE html>
<html>

<head>

<title>Alerts</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="sidebar">

<h3>☁ Cloud Monitor</h3>

<a href="/dashboard">Dashboard</a>
<a href="/history">History</a>
<a href="/alerts">Alerts</a>
<a href="/reports">Reports</a>
<a href="/logout">Logout</a>

</div>

<div class="main-content">

<h2>Alert History</h2>

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>
<th>Message</th>
<th>Action</th>
<th>Severity</th>
<th>Date</th>

</tr>

</thead>

<tbody>

{% for row in records %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>

<a
href="/delete_alert/{{row[0]}}"
class="btn btn-danger btn-sm">

Delete

</a>

</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
